define host {
    use                     generic-host
    host_name               DEMOHOST
    alias                   DEMOHOST (CEP demo)
    address                 127.0.0.1
}

define service {
    use                     generic-service,srv-perf
    host_name               DEMOHOST
    service_description     DEMOSERVICE
    check_command           cep_execute!$USER2$/check_cep --host-name '$HOSTNAME$' --service-description '$SERVICEDESC$' --image 'localhost/check_cep:latest' --probe-location 'local' --test-source local --result-dest local --test-dir '$USER4$/etc/check_cep/tests/%h/%s' --result-dir '$USER4$/var/tmp/check_cep/%h/%s/%t' --report-url "/cep/check_cep/%h/%s/%t/playwright-report/index.html" --timeout 60
    check_interval          10
    retry_interval          5
}

define command {
    command_name            cep_execute
    command_line            $ARG1$
}
